<meta charset="utf-8">
<title>Essential Spanish Fluency</title>
<style>
  :root{
    --ink:#D3DEEC; --surface:#EDF2F9; --surface-2:#E1E9F4; --line:#C2CFE0;
    --text:#16202F; --text-soft:#3B475C; --muted:#4F5D74;
    --accent:#A96A05; --accent-fill:#F4B740; --accent-ink:#2A1C00;
    --signal:#0F7A50; --signal-soft:#DCF0E7; --coral:#C7423A; --coral-soft:#F8E3E1;
    --teal:#0E8C86; --teal-soft:#D6EEEC;
    --glow:rgba(244,183,64,.30);
    --shadow:0 1px 2px rgba(20,32,51,.07),0 10px 28px rgba(20,32,51,.10);
    --r-sm:10px; --r-md:14px; --r-lg:20px;
    --t-xs:11px; --t-sm:13px; --t-md:15px; --t-lg:20px; --t-hero:28px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --ink:#0C1219; --surface:#161F2E; --surface-2:#1E293B; --line:#2C3A50;
      --text:#E9EEF6; --text-soft:#BCC7D8; --muted:#8A98AD;
      --accent:#F4B740; --accent-fill:#F4B740; --accent-ink:#2A1C00;
      --signal:#3DD68C; --signal-soft:#123026; --coral:#FF6B6B; --coral-soft:#3A1D1D;
      --teal:#38C6BE; --teal-soft:#0E2E2C;
      --glow:rgba(244,183,64,.16);
      --shadow:0 1px 2px rgba(0,0,0,.3),0 14px 36px rgba(0,0,0,.42); }
  }
  :root[data-theme="dark"]{--ink:#0C1219;--surface:#161F2E;--surface-2:#1E293B;--line:#2C3A50;--text:#E9EEF6;--text-soft:#BCC7D8;--muted:#8A98AD;--accent:#F4B740;--accent-fill:#F4B740;--accent-ink:#2A1C00;--signal:#3DD68C;--signal-soft:#123026;--coral:#FF6B6B;--coral-soft:#3A1D1D;--teal:#38C6BE;--teal-soft:#0E2E2C;--glow:rgba(244,183,64,.16);--shadow:0 1px 2px rgba(0,0,0,.3),0 14px 36px rgba(0,0,0,.42);}
  :root[data-theme="light"]{--ink:#D3DEEC;--surface:#EDF2F9;--surface-2:#E1E9F4;--line:#C2CFE0;--text:#16202F;--text-soft:#3B475C;--muted:#4F5D74;--accent:#A96A05;--accent-fill:#F4B740;--accent-ink:#2A1C00;--signal:#0F7A50;--signal-soft:#DCF0E7;--coral:#C7423A;--coral-soft:#F8E3E1;--teal:#0E8C86;--teal-soft:#D6EEEC;--glow:rgba(244,183,64,.30);--shadow:0 1px 2px rgba(20,32,51,.07),0 10px 28px rgba(20,32,51,.10);}

  *{box-sizing:border-box;} html,body{margin:0;}
  body{ background:var(--ink); color:var(--text);
    background-image:radial-gradient(130% 60% at 50% -12%, var(--glow), transparent 62%);
    background-attachment:fixed; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased; }
  .mono{font-family:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;}
  .wrap{max-width:660px; margin:0 auto; padding:0 16px 120px;}
  svg{display:block;}
  .hidden{display:none!important;}

  /* boot */
  #boot{position:fixed;inset:0;z-index:60;background:var(--ink);
    background-image:radial-gradient(130% 62% at 50% 40%, var(--glow), transparent 62%);
    display:grid;place-items:center;transition:opacity .5s;}
  #boot.gone{opacity:0;pointer-events:none;}
  .boot-glyph{width:60px;height:60px;border-radius:16px;margin:0 auto 16px;background:var(--accent-fill);
    color:var(--accent-ink);display:grid;place-items:center;font-weight:800;font-size:var(--t-hero);
    box-shadow:0 0 44px rgba(244,183,64,.55);animation:bootpulse 1.4s ease-in-out infinite;}
  @keyframes bootpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .boot-in{text-align:center;}
  .boot-in b{font-size:var(--t-md);letter-spacing:.01em;}
  .boot-in span{display:block;font-size:var(--t-xs);letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
  .boot-line{width:176px;height:3px;margin:20px auto 0;border-radius:3px;background:var(--surface-2);overflow:hidden;}
  .boot-line i{display:block;height:100%;width:0;border-radius:3px;background:var(--accent-fill);
    box-shadow:0 0 12px var(--accent-fill);animation:bootfill 1.5s ease forwards;}
  @keyframes bootfill{to{width:100%;}}

  /* appbar */
  .appbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--ink) 82%,transparent);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);}
  .appbar-in{max-width:660px;margin:0 auto;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .glyph{width:30px;height:30px;border-radius:var(--r-sm);flex:none;background:var(--accent-fill);
    color:var(--accent-ink);display:grid;place-items:center;font-weight:800;font-size:var(--t-md);
    box-shadow:0 0 0 1px rgba(0,0,0,.05),0 0 16px rgba(244,183,64,.4);}
  .brand b{font-size:var(--t-sm);letter-spacing:.01em;}
  .brand span{display:block;font-size:var(--t-xs);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:-1px;}
  .bar-btns{display:flex;gap:8px;align-items:center;}
  .streak-pill{display:inline-flex;align-items:center;gap:5px;font-size:var(--t-sm);font-weight:700;color:var(--accent);
    background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 11px;}
  .icon-btn{background:var(--surface);color:var(--muted);border:1px solid var(--line);border-radius:999px;
    padding:8px;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;justify-content:center;}
  .icon-btn:hover{color:var(--text);border-color:var(--accent);} .icon-btn svg{width:16px;height:16px;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:20px;margin-top:16px;}
  .btn{appearance:none;font-family:inherit;cursor:pointer;border-radius:var(--r-sm);border:1px solid var(--line);
    background:var(--surface-2);color:var(--text);padding:12px 16px;font-size:var(--t-md);font-weight:600;
    display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:.15s;}
  .btn:hover{border-color:var(--accent);}
  .btn.primary{background:var(--accent-fill);color:var(--accent-ink);border-color:var(--accent-fill);}
  .btn.primary:hover{filter:brightness(1.05);}
  .btn.big{width:100%;padding:15px;font-size:16px;}
  .btn.mic.rec{background:var(--coral);border-color:var(--coral);color:#fff;}
  .btn svg{width:17px;height:17px;} .btn:disabled{opacity:.5;cursor:default;}
  .btn.ghost{background:transparent;}
  .speaking{animation:spk 1s ease-in-out infinite;}
  @keyframes spk{0%,100%{box-shadow:0 0 0 0 rgba(244,183,64,.5)}50%{box-shadow:0 0 0 8px rgba(244,183,64,0)}}
  .row{display:flex;gap:10px;flex-wrap:wrap;} .row>.btn{flex:1;}

  /* hero today */
  .hero{background:linear-gradient(160deg,var(--surface),var(--surface-2));border:1px solid var(--line);
    border-radius:var(--r-lg);box-shadow:var(--shadow);padding:22px 20px;margin-top:18px;position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;inset:-40% 40% auto auto;width:220px;height:220px;border-radius:50%;
    background:radial-gradient(circle,var(--glow),transparent 70%);pointer-events:none;}
  .hero-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;position:relative;}
  .daychip{font-size:var(--t-xs);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-family:ui-monospace,monospace;}
  .hero-big{font-size:54px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.03em;position:relative;}
  .hero-sub{font-size:var(--t-md);color:var(--text-soft);margin:6px 0 18px;position:relative;}
  .hero-sub b{color:var(--accent);}
  .hero .btn{position:relative;}
  .hero-done{font-size:var(--t-md);color:var(--signal);font-weight:600;margin:6px 0 16px;}

  /* coverage */
  .cover{display:flex;align-items:center;gap:18px;}
  .cover-ring{flex:none;position:relative;width:96px;height:96px;}
  .cover-ring svg{width:96px;height:96px;transform:rotate(-90deg);}
  .cover-ring .cnum{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:20px;font-variant-numeric:tabular-nums;}
  .cover-txt b{display:block;font-size:var(--t-md);color:var(--text);}
  .cover-txt p{margin:4px 0 0;font-size:var(--t-sm);color:var(--muted);line-height:1.5;}
  .cover-txt .big{font-size:26px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}

  /* phase cards */
  .sect-label{font-size:var(--t-xs);letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:26px 4px 2px;}
  .phase{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-md);box-shadow:var(--shadow);padding:14px 16px;margin-top:12px;cursor:pointer;transition:.15s;text-align:left;width:100%;font-family:inherit;color:inherit;}
  .phase:hover{border-color:var(--accent);transform:translateY(-1px);}
  .phase .pico{width:46px;height:46px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:22px;
    background:var(--surface-2);border:1px solid var(--line);}
  .phase .pmid{flex:1;min-width:0;}
  .phase .pn{font-size:var(--t-xs);letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-family:ui-monospace,monospace;font-weight:700;}
  .phase .pt{font-size:var(--t-md);font-weight:700;color:var(--text);}
  .phase .pd{font-size:var(--t-sm);color:var(--muted);}
  .pbar{height:6px;border-radius:3px;background:var(--surface-2);overflow:hidden;margin-top:7px;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent-fill),#ffd884);border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
  .phase .pright{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .duebadge{font-size:var(--t-xs);font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent-ink);background:var(--accent-fill);border-radius:999px;padding:2px 9px;min-width:22px;text-align:center;}
  .duebadge.zero{color:var(--muted);background:var(--surface-2);border:1px solid var(--line);}
  .phase .chev{color:var(--muted);}

  /* session */
  .sess-top{display:flex;align-items:center;gap:12px;padding:14px 0 4px;position:sticky;top:53px;background:transparent;}
  .sess-x{background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:8px;cursor:pointer;display:inline-flex;}
  .sess-x svg{width:16px;height:16px;}
  .sprog{flex:1;height:8px;border-radius:4px;background:var(--surface-2);overflow:hidden;}
  .sprog i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--accent-fill));border-radius:4px;transition:width .35s ease;}
  .scount{font-size:var(--t-sm);color:var(--muted);font-variant-numeric:tabular-nums;font-family:ui-monospace,monospace;}

  .qcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:24px 20px;margin-top:16px;min-height:300px;display:flex;flex-direction:column;}
  .qphase{font-size:var(--t-xs);letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:14px;font-family:ui-monospace,monospace;display:flex;justify-content:space-between;}
  .qphase .mold{color:var(--accent);}
  .prompt{text-align:center;margin:10px 0 6px;}
  .prompt .big{font-size:30px;font-weight:600;line-height:1.15;text-wrap:balance;}
  .prompt .big.q{font-weight:600;}
  .prompt .sub{font-size:var(--t-md);color:var(--muted);margin-top:6px;}
  .reveal{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .reveal .es{font-size:var(--t-lg);font-weight:600;margin:0 0 4px;}
  .reveal .es em{color:var(--accent);font-style:normal;}
  .reveal .en{font-size:var(--t-md);color:var(--text-soft);}
  .reveal .exline{margin-top:12px;font-size:var(--t-md);} .reveal .exline .esx{color:var(--text);} .reveal .exline .enx{color:var(--muted);font-size:var(--t-sm);display:block;margin-top:2px;}
  .spacer{flex:1;}
  .center{text-align:center;}
  .hintline{font-size:var(--t-xs);color:var(--muted);text-align:center;margin-top:14px;display:flex;gap:6px;align-items:center;justify-content:center;}
  .hintline svg{width:13px;height:13px;}

  /* grade buttons */
  .grades{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px;}
  .grade{appearance:none;font-family:inherit;cursor:pointer;border-radius:var(--r-sm);border:1px solid var(--line);
    background:var(--surface-2);padding:12px 6px;font-weight:700;font-size:var(--t-sm);transition:.15s;display:flex;flex-direction:column;gap:3px;align-items:center;}
  .grade small{font-weight:500;font-size:10px;color:var(--muted);}
  .grade.again{color:var(--coral);} .grade.again:hover{border-color:var(--coral);background:var(--coral-soft);}
  .grade.good{color:var(--teal);} .grade.good:hover{border-color:var(--teal);background:var(--teal-soft);}
  .grade.easy{color:var(--signal);} .grade.easy:hover{border-color:var(--signal);background:var(--signal-soft);}
  .grade.suggest{box-shadow:0 0 0 2px var(--accent-fill);}

  /* clarity report (shadowing) */
  .report{margin-top:16px;border-radius:var(--r-sm);padding:14px 15px;background:var(--surface-2);border:1px solid var(--line);display:none;}
  .report.show{display:block;animation:fade .25s ease;}
  .rep-head{display:flex;align-items:baseline;gap:9px;margin-bottom:11px;}
  .rep-score{font-size:27px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;}
  .rep-score.g-ok{color:var(--signal);} .rep-score.g-mid{color:var(--accent);} .rep-score.g-low{color:var(--coral);}
  .rep-label{font-size:var(--t-xs);text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
  .rep-target{font-size:var(--t-md);line-height:1.85;}
  .rep-target .w{padding:1px 3px;border-radius:4px;}
  .rep-target .w-ok{color:var(--signal);} .rep-target .w-miss{color:var(--coral);text-decoration:underline wavy;text-underline-offset:3px;}
  .rep-tip{margin-top:11px;font-size:var(--t-sm);color:var(--text-soft);} .rep-tip b{color:var(--coral);}
  .rep-heard{margin-top:9px;font-size:var(--t-xs);color:var(--muted);} .rep-heard b{color:var(--text);}

  /* done screen */
  .done-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);
    padding:32px 24px;margin-top:40px;text-align:center;position:relative;overflow:hidden;}
  .done-badge{width:66px;height:66px;border-radius:50%;margin:0 auto 18px;border:2px solid var(--accent-fill);color:var(--accent);
    display:grid;place-items:center;box-shadow:0 0 34px rgba(244,183,64,.4);}
  .done-badge svg{width:30px;height:30px;}
  .done-card h2{margin:0 0 6px;font-size:22px;}
  .done-card p{margin:0 0 20px;color:var(--text-soft);font-size:var(--t-md);}
  .done-stats{display:flex;justify-content:center;gap:26px;margin:0 0 22px;}
  .done-stat b{display:block;font-size:26px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}
  .done-stat span{font-size:var(--t-xs);text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}

  #fx{position:fixed;inset:0;pointer-events:none;z-index:70;}
  @media (max-width:460px){ .prompt .big{font-size:25px;} .hero-big{font-size:46px;} }
  @media (prefers-reduced-motion:reduce){*,*::before{animation:none!important;transition:none!important;}}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
</style>

<div id="boot"><div class="boot-in">
  <div class="boot-glyph">FR</div>
  <b>Fluency Route</b><span>Essential Spanish Fluency</span>
  <div class="boot-line"><i></i></div>
</div></div>

<header class="appbar"><div class="appbar-in">

  </div>
</div></header>

  <main id="home" class="screen"></main>

</div>

let esVoice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices();
  esVoice=vs.find(v=>/es[-_]MX/i.test(v.lang)&&/google/i.test(v.name))||vs.find(v=>/es[-_]MX/i.test(v.lang))||vs.find(v=>/es[-_]US/i.test(v.lang))||vs.find(v=>/^es/i.test(v.lang))||null; }
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text,btn,onend,rate){ if(!("speechSynthesis" in window)){ if(onend)onend(); return; }
  speechSynthesis.cancel();
  const go=()=>{ const u=new SpeechSynthesisUtterance(text); u.lang="es-MX"; u.rate=rate||.95; if(esVoice)u.voice=esVoice;
    if(btn)btn.classList.add("speaking");
    u.onend=()=>{ if(btn)btn.classList.remove("speaking"); if(onend)onend(); };
    u.onerror=()=>{ if(btn)btn.classList.remove("speaking"); };
    speechSynthesis.speak(u); };
  setTimeout(go,60); }
function speakSeq(lines,i,rate){ i=i||0; if(!("speechSynthesis" in window)||i>=lines.length)return; if(i===0)speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(lines[i]); u.lang="es-MX"; u.rate=rate||.95; if(esVoice)u.voice=esVoice;
  u.onend=()=>speakSeq(lines,i+1,rate); setTimeout(()=>speechSynthesis.speak(u),i===0?60:0); }

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const micOK=!!SR;
let activeRec=null;
function listen(target,onResult){ if(!micOK){ onResult(null); return; }
  const r=new SR(); activeRec=r; r.lang="es-MX"; r.interimResults=false; r.maxAlternatives=3;
  r.onresult=e=>{ let best="",score=0; for(let i=0;i<e.results[0].length;i++){ const t=e.results[0][i].transcript, sc=simil(norm(t),norm(target)); if(sc>=score){score=sc;best=t;} } onResult({heard:best,score}); };
  r.onerror=e=>onResult({error:e.error});
  r.onend=()=>{ if(activeRec===r)activeRec=null; };
  try{ r.start(); }catch(e){ onResult({error:"start"}); } }
function simil(a,b){ const A=a.split(" ").filter(Boolean),Bw=b.split(" ").filter(Boolean); if(!Bw.length)return 0;
  let hit=0; const used=[]; Bw.forEach(w=>{ const i=A.findIndex((x,k)=>x===w&&!used.includes(k)); if(i>=0){hit++;used.push(i);} }); return hit/Bw.length; }
function diagnose(target,said){ const rawT=target.replace(/\s+/g," ").trim().split(" ");
  const T=rawT.map(norm),S=norm(said).split(" ").filter(Boolean);
  const n=T.length,m=S.length,dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=1;i<=n;i++)for(let j=1;j<=m;j++)dp[i][j]=T[i-1]===S[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const ok=new Array(n).fill(false); let i=n,j=m;
  while(i>0&&j>0){ if(T[i-1]===S[j-1]){ok[i-1]=true;i--;j--;} else if(dp[i-1][j]>=dp[i][j-1])i--; else j--; }
  const hits=ok.filter(Boolean).length; return {rawT,ok,hits,total:n,pct:n?Math.round(hits/n*100):0}; }
function stopAll(){ try{ if(activeRec)activeRec.abort(); }catch(e){} activeRec=null; if("speechSynthesis" in window)speechSynthesis.cancel(); }

const ICON={

  mic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4"/></svg>',
  eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>',
  x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
};

/* ═══════════════ SRS ═══════════════ */
const DAY=86400000, MATURE=21;
let SRS=loadJSON("esf_srs",{});
const skey=(ph,id)=>ph+"|"+id;
const stateOf=(ph,id)=>SRS[skey(ph,id)]||null;
const isDue=s=>!!s&&s.d<=Date.now();
function gradeItem(ph,id,g){ let s=SRS[skey(ph,id)]; const now=Date.now();
  if(!s)s={r:0,i:0,e:2.3,l:0,d:now};
  if(g==="again"){ s.r=0; s.l++; s.e=Math.max(1.3,s.e-0.2); s.i=0; s.d=now+10*60000; }
  else if(g==="good"){ s.r++; s.i=s.i<1?1:Math.round(s.i*s.e); s.d=now+s.i*DAY; }
  else if(g==="easy"){ s.r++; s.e=Math.min(3.2,s.e+0.15); s.i=s.i<1?3:Math.round(s.i*s.e*1.3); s.d=now+s.i*DAY; }
  SRS[skey(ph,id)]=s; saveJSON("esf_srs",SRS); }
const dueCount=ph=>DECK[ph].filter(id=>isDue(stateOf(ph,id))).length;
const newCount=ph=>DECK[ph].filter(id=>!stateOf(ph,id)).length;
const masteredCount=ph=>DECK[ph].filter(id=>{ const s=stateOf(ph,id); return s&&s.i>=MATURE; }).length;
const seenCount=ph=>DECK[ph].filter(id=>!!stateOf(ph,id)).length;

const NEW_TODAY=12, PER_PHASE_NEW=8;
function buildToday(){ const due=[],news=[];
  PHASES.forEach(p=>DECK[p.key].forEach(id=>{ const s=stateOf(p.key,id); if(isDue(s))due.push({ph:p.key,id}); else if(!s)news.push({ph:p.key,id}); }));
  return shuffle(due).concat(news.slice(0,NEW_TODAY)); }
function buildPhase(ph){ const due=[],news=[];
  DECK[ph].forEach(id=>{ const s=stateOf(ph,id); if(isDue(s))due.push({ph,id}); else if(!s)news.push({ph,id}); });
  return shuffle(due).concat(news.slice(0,PER_PHASE_NEW)); }

/* ═══════════════ PROGRESS / STREAK / PLAN ═══════════════ */
let planStart=+localStorage.getItem("esf_start")||0;
if(!planStart){ planStart=Date.now(); try{ localStorage.setItem("esf_start",planStart); }catch(e){} }
const planDay=()=>Math.min(90,Math.floor((Date.now()-planStart)/DAY)+1);
let streak=loadJSON("esf_streak",{count:0,last:0});
const dayNum=ts=>Math.floor((ts-new Date().getTimezoneOffset()*60000)/DAY);
function bumpStreak(){ const t=dayNum(Date.now()); if(streak.last===t)return;
  streak.count=(streak.last===t-1)?streak.count+1:1; streak.last=t; saveJSON("esf_streak",streak); }

/* ═══════════════ HOME ═══════════════ */
const home=$("home"), sessionEl=$("session"), doneEl=$("done");
function show(el){ [home,sessionEl,doneEl].forEach(s=>s.classList.add("hidden")); el.classList.remove("hidden"); window.scrollTo(0,0); }

function renderHome(){
  stopAll();
  $("streakPill").textContent="🔥 "+streak.count;
  const dueAll=PHASES.reduce((n,p)=>n+dueCount(p.key),0);
  const newAvail=PHASES.reduce((n,p)=>n+newCount(p.key),0);
  const newToday=Math.min(NEW_TODAY,newAvail);
  const total=dueAll+newToday;
  const words=masteredCount("p1"), wordsSeen=seenCount("p1");
  const pct=Math.round(words/Math.max(1,VOCAB.length)*100);
  const R=42, C=2*Math.PI*R, off=C*(1-words/Math.max(1,VOCAB.length));

  let html=`
  <div class="hero">
    <div class="hero-top"><span class="daychip">Day ${planDay()} · 90-Day Intensive</span></div>`;
  if(total>0){
    html+=`<div class="hero-big">${total}</div>
    <div class="hero-sub"><b>${dueAll}</b> reviews · <b>${newToday}</b> new to learn</div>
    <button class="btn primary big" id="startToday">Start today's session</button>`;
  } else {
    html+=`<div class="hero-done">✓ You're all caught up for today.</div>
    <div class="hero-sub" style="margin-top:-4px">Come back tomorrow for your spaced reviews — or push ahead into any phase below.</div>
    <button class="btn big" id="startToday">Practice anyway</button>`;
  }
  html+=`</div>

  <div class="card cover">
    <div class="cover-ring">
      <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="${R}" fill="none" stroke="var(--surface-2)" stroke-width="9"/>
        <circle cx="50" cy="50" r="${R}" fill="none" stroke="var(--accent-fill)" stroke-width="9" stroke-linecap="round"
          stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" style="transition:stroke-dashoffset 1s cubic-bezier(.16,1,.3,1)"/></svg>
      <div class="cnum">${pct}%</div>
    </div>
    <div class="cover-txt">
      <span class="big">${words}</span> <b style="display:inline">essential words on autopilot</b>
      <p>${wordsSeen} of ${VOCAB.length} started · with the core set you cover ~90% of everyday conversation.</p>
    </div>
  </div>

  <div class="sect-label">The 4 phases of essential fluency</div>`;

  PHASES.forEach(p=>{
    const deck=DECK[p.key], mst=masteredCount(p.key), du=dueCount(p.key);
    const prog=Math.round(mst/Math.max(1,deck.length)*100);
    html+=`
    <button class="phase" data-ph="${p.key}">
      <div class="pico">${p.icon}</div>
      <div class="pmid">
        <div class="pn">${p.name}</div>
        <div class="pt">${p.title}</div>
        <div class="pd">${p.tag}</div>
        <div class="pbar"><i style="width:${prog}%"></i></div>
      </div>
      <div class="pright">
        <span class="duebadge ${du?'':'zero'}">${du?du:'✓'}</span>
        <span class="chev">›</span>
      </div>
    </button>`;
  });
  home.innerHTML=html;

  const st=$("startToday"); if(st) st.onclick=()=>openSession("today");
  home.querySelectorAll(".phase").forEach(el=>el.onclick=()=>openSession(el.dataset.ph));
  show(home);
}

/* ═══════════════ SESSION ═══════════════ */
let queue=[], qpos=0, sess={reviews:0,learned:0,mode:"today"};
function openSession(mode){
  queue = mode==="today"?buildToday():buildPhase(mode);
  if(!queue.length){ // nothing due & no new — offer a free practice pull
    const pool = mode==="today" ? PHASES.flatMap(p=>DECK[p.key].map(id=>({ph:p.key,id}))) : DECK[mode].map(id=>({ph:mode,id}));
    queue=shuffle(pool).slice(0,10);
  }
  qpos=0; sess={reviews:0,learned:0,mode};
  show(sessionEl); renderCard();
}
function nextCard(){ qpos++; renderCard(); }
function sessHeader(){
  return `<div class="sess-top">
    <button class="sess-x" id="sx" aria-label="Exit session">${ICON.x}</button>
    <div class="sprog"><i style="width:${Math.round(qpos/queue.length*100)}%"></i></div>
    <span class="scount">${Math.min(qpos+1,queue.length)}/${queue.length}</span>
  </div>`;
}
function renderCard(){
  stopAll();
  if(qpos>=queue.length){ finishSession(); return; }
  const {ph,id}=queue[qpos]; const wasNew=!stateOf(ph,id);
  const P=PHASES.find(p=>p.key===ph); const c=itemContent(id);
  sessionEl.innerHTML=sessHeader()+`<div class="qcard" id="qcard"></div>`;
  $("sx").onclick=()=>{ stopAll(); renderHome(); };
  const card=$("qcard");
  const doGrade=g=>{ gradeItem(ph,id,g); if(wasNew)sess.learned++; else sess.reviews++; nextCard(); };

  if(P.mode==="word") cardWord(card,c.data,doGrade,ph,id);
  else if(P.mode==="comprehend") cardComprehend(card,c,doGrade,P);
  else if(P.mode==="shadow") cardShadow(card,c,doGrade,P);
  else if(P.mode==="immerse") cardImmerse(card,c,doGrade,P);
}

function gradeRow(onGrade,suggest){
  const wrap=document.createElement("div"); wrap.className="grades";
  [["again","Again","< 1 min"],["good","Good","spaced"],["easy","Easy","long gap"]].forEach(([g,lbl,sub])=>{
    const b=document.createElement("button"); b.className="grade "+g+(suggest===g?" suggest":"");
    b.innerHTML=`${lbl}<small>${sub}</small>`; b.onclick=()=>onGrade(g); wrap.appendChild(b); });
  return wrap;
}

/* Phase 1 — word recognition */
function cardWord(card,w,onGrade,ph,id){
  card.innerHTML=`<div class="qphase"><span>👂 Auditory Perception</span><span>${seenCount(ph)>DECK[ph].indexOf(id)?'':''}</span></div>
    <div class="prompt"><div class="sub">Listen. What does it mean?</div></div>`;
  const play=document.createElement("button"); play.className="btn primary big"; play.style.marginTop="10px";
  play.innerHTML=ICON.play+" Play the word";
  play.onclick=()=>speak(w.es,play);
  card.append(play);
  const spacer=document.createElement("div"); spacer.className="spacer"; card.append(spacer);
  const reveal=document.createElement("button"); reveal.className="btn"; reveal.style.width="100%";
  reveal.innerHTML=ICON.eye+" Show meaning";
  reveal.onclick=()=>{
    reveal.remove();
    const r=document.createElement("div"); r.className="reveal";
    r.innerHTML=`<p class="es mono">${w.es}</p><p class="en">${w.en}</p>
      <div class="exline"><span class="esx mono">${w.ex}</span><span class="enx">${w.exEn}</span></div>`;
    const ex=document.createElement("button"); ex.className="btn ghost"; ex.style.marginTop="10px";
    ex.innerHTML=ICON.play+" Hear it in a sentence"; ex.onclick=()=>speak(w.ex,ex);
    r.append(ex);
    card.insertBefore(r,spacer.nextSibling||null);
    card.append(gradeRow(onGrade));
  };
  card.append(reveal);
  speak(w.es);
}

/* Phase 2 — comprehension of fast connected speech */
function cardComprehend(card,c,onGrade,P){
  const b=c.data, sc=SCENES[c.idx]; const line=sc?sc.b:fullSentence(b,b.v[0]);
  card.innerHTML=`<div class="qphase"><span>💬 Conversational</span><span class="mold">${MOLD_LABEL[b.m]}</span></div>
    <div class="prompt"><div class="sub">Listen at natural speed. Can you catch it?</div></div>`;
  const row=document.createElement("div"); row.className="row"; row.style.marginTop="12px";
  const play=document.createElement("button"); play.className="btn primary"; play.innerHTML=ICON.play+" Play"; play.onclick=()=>speak(line,play);
  const slow=document.createElement("button"); slow.className="btn"; slow.innerHTML=ICON.slow+" Slow"; slow.onclick=()=>speak(line,slow,null,.62);
  row.append(play,slow); card.append(row);
  const spacer=document.createElement("div"); spacer.className="spacer"; card.append(spacer);
  const reveal=document.createElement("button"); reveal.className="btn"; reveal.style.width="100%";
  reveal.innerHTML=ICON.eye+" Reveal";
  reveal.onclick=()=>{
    reveal.remove();
    const hi=line.replace(new RegExp("("+esc(sc?sc.s:stemOf(b))+")","i"),"<em>$1</em>");
    const r=document.createElement("div"); r.className="reveal";
    r.innerHTML=`<p class="es mono">${hi}</p><p class="en">Key phrase — <b>${b.es.replace(/…/g,'…')}</b> = ${b.en}</p>`;
    card.insertBefore(r,spacer.nextSibling||null);
    card.append(gradeRow(onGrade));
  };
  card.append(reveal);
  speak(line);
}

/* Phase 3 — shadowing (record + clarity diagnosis) */
function cardShadow(card,c,onGrade,P){
  const b=c.data; const model=b.m==="ready"?b.es:fullSentence(b,b.v[0]);
  card.innerHTML=`<div class="qphase"><span>🎙️ Shadowing</span><span class="mold">${b.en}</span></div>
    <div class="prompt"><div class="big mono">${b.m==="ready"?model:('<em style="color:var(--accent);font-style:normal">'+stemOf(b)+'</em> '+b.v[0])}</div></div>`;
  const row=document.createElement("div"); row.className="row"; row.style.marginTop="14px";
  const play=document.createElement("button"); play.className="btn"; play.innerHTML=ICON.play+" Hear it"; play.onclick=()=>speak(model,play);
  const mic=document.createElement("button"); mic.className="btn mic primary"; mic.innerHTML=ICON.mic+" Say it";
  row.append(play,mic); card.append(row);
  const rep=document.createElement("div"); rep.className="report"; card.append(rep);
  const spacer=document.createElement("div"); spacer.className="spacer"; card.append(spacer);
  let graded=false;
  const showGrades=sg=>{ if(card.querySelector(".grades"))return; card.append(gradeRow(onGrade,sg)); };
  mic.onclick=()=>{
    if(!micOK){ rep.className="report show"; rep.innerHTML='<div class="rep-tip">Your browser can\'t record here — say it out loud along with the model, then grade yourself. For the clarity score, open in Chrome.</div>'; showGrades("good"); return; }
    mic.classList.add("rec"); mic.innerHTML=ICON.mic+" Listening…";
    listen(model,res=>{ mic.classList.remove("rec"); mic.innerHTML=ICON.mic+" Try again";
      if(!res||res.error){ rep.className="report show"; rep.innerHTML='<div class="rep-tip">I couldn\'t hear you. Try again somewhere quieter.</div>'; return; }
      buzz(20); const d=diagnose(model,res.heard); const g=grade(d.pct);
      const words=d.rawT.map((w,k)=>`<span class="w ${d.ok[k]?'w-ok':'w-miss'}">${w}</span>`).join(" ");
      const miss=d.rawT.filter((w,k)=>!d.ok[k]);
      rep.className="report show";
      rep.innerHTML=`<div class="rep-head"><span class="rep-score ${g[0]}">${d.pct}%</span><span class="rep-label">Clarity · ${g[1]}</span></div>
        <div class="rep-target mono">${words}</div>`+
        (miss.length?`<div class="rep-tip">Sounds to polish: <b>${miss.join(", ")}</b>. Play it again focusing on those.</div>`:`<div class="rep-tip">Clean — the rhythm is going on autopilot.</div>`)+
        `<div class="rep-heard">Heard: <b>${res.heard||"—"}</b></div>`;
      showGrades(d.pct>=85?"easy":d.pct>=60?"good":"again");
    });
  };
}
function grade(pct){ return pct>=85?["g-ok","crystal clear"]:pct>=60?["g-mid","almost there"]:["g-low","needs work"]; }

/* Phase 4 — immersion (whole scene, subtitles hidden) */
function cardImmerse(card,c,onGrade,P){
  const sc=c.data;
  card.innerHTML=`<div class="qphase"><span>🌍 Simulated Immersion</span><span>no subtitles</span></div>
    <div class="prompt"><div class="sub">Listen to the whole exchange. Get the gist — don't translate.</div></div>`;
  const play=document.createElement("button"); play.className="btn primary big"; play.style.marginTop="10px";
  play.innerHTML=ICON.play+" Play the scene"; play.onclick=()=>speakSeq([sc.a,sc.b]);
  card.append(play);
  const spacer=document.createElement("div"); spacer.className="spacer"; card.append(spacer);
  const reveal=document.createElement("button"); reveal.className="btn"; reveal.style.width="100%";
  reveal.innerHTML=ICON.eye+" Reveal the text";
  reveal.onclick=()=>{
    reveal.remove();
    const hi=sc.b.replace(new RegExp("("+esc(sc.s)+")","i"),"<em>$1</em>");
    const r=document.createElement("div"); r.className="reveal";
    r.innerHTML=`<p class="es mono" style="color:var(--muted)">${sc.a}</p><p class="es mono">${hi}</p>`;
    card.insertBefore(r,spacer.nextSibling||null);
    card.append(gradeRow(onGrade));
  };
  card.append(reveal);
  speakSeq([sc.a,sc.b]);
}

/* ═══════════════ DONE ═══════════════ */
function finishSession(){
  stopAll();
  const did=sess.reviews+sess.learned;
  if(did>0) bumpStreak();
  fx(70); buzz([30,50,30]);
  const words=masteredCount("p1");
  doneEl.innerHTML=`<div class="done-card">
    <div class="done-badge">${ICON.check}</div>
    <h2>${did>0?"Session complete":"Nice run"}</h2>
    <p>${did>0?"Every rep pushes Spanish deeper into your subconscious.":"Come back tomorrow for your spaced reviews."}</p>
    <div class="done-stats">
      <div class="done-stat"><b>${sess.learned}</b><span>new</span></div>
      <div class="done-stat"><b>${sess.reviews}</b><span>reviews</span></div>
      <div class="done-stat"><b>🔥 ${streak.count}</b><span>streak</span></div>
    </div>
    <button class="btn primary big" id="doneHome">Back to home</button>
    <button class="btn ghost" id="doneMore" style="width:100%;margin-top:10px">Keep training</button>
  </div>`;
  show(doneEl);
  $("doneHome").onclick=renderHome;
  $("doneMore").onclick=()=>openSession(sess.mode);
}

/* ═══════════════ FX / THEME / BOOT ═══════════════ */
const cv=$("fx"),cx=cv.getContext("2d"); let parts=[],raf=null;
function rz(){ cv.width=innerWidth; cv.height=innerHeight; } rz(); addEventListener("resize",rz);
function fx(n){ if(reduced)return; const cols=["#F4B740","#FFD884","#FFE9B0"];
  for(let i=0;i<n;i++)parts.push({x:cv.width/2+(Math.random()-.5)*140,y:cv.height*.32,vx:(Math.random()-.5)*5,vy:Math.random()*-8.5-3.5,g:.24,len:Math.random()*10+7,w:Math.random()*1.6+1,c:cols[i%3],life:66,rot:(Math.random()-.5)*.6});
  if(!raf)raf=requestAnimationFrame(tick); }
function tick(){ cx.clearRect(0,0,cv.width,cv.height); parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.life--; cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot+Math.atan2(p.vy,p.vx)+Math.PI/2);
    cx.globalAlpha=Math.min(1,p.life/28); cx.fillStyle=p.c; cx.shadowBlur=8; cx.shadowColor=p.c; cx.fillRect(-p.w/2,-p.len/2,p.w,p.len); cx.restore(); });
  if(parts.length)raf=requestAnimationFrame(tick); else raf=null; }

$("theme").onclick=()=>{ const cur=document.documentElement.getAttribute("data-theme");
  const isDark=cur?cur==="dark":matchMedia("(prefers-color-scheme: dark)").matches;
  const next=isDark?"light":"dark"; document.documentElement.setAttribute("data-theme",next);
  try{ localStorage.setItem("esf_theme",next); }catch(e){} };

addEventListener("keydown",e=>{ if(e.key==="Escape"&&!sessionEl.classList.contains("hidden")){ stopAll(); renderHome(); } });

let bootMs=1500; try{ if(localStorage.getItem("esf_boot"))bootMs=500; localStorage.setItem("esf_boot","1"); }catch(e){}
if(reduced){ $("boot").classList.add("gone"); } else { setTimeout(()=>$("boot").classList.add("gone"),bootMs); }
$("boot").onclick=()=>$("boot").classList.add("gone");

renderHome();
</script>
